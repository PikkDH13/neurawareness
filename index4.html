<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Subsystem Compiling | The Blueprint</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg-color: #0d1117; 
            --card-bg: rgba(255, 255, 255, 0.02);
            --text-main: #e2e8f0;
            --text-dim: #94a3b8;
            --blueprint-blue: #00a3ff;
            --resonance-purple: #a855f7;
            --border: rgba(255, 255, 255, 0.08);
            --grid-line: rgba(0, 163, 255, 0.03);
            --nav-bg: rgba(13, 17, 23, 0.85);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: 'Inter', sans-serif;
            overflow: hidden;
            background-image: 
                linear-gradient(var(--grid-line) 1px, transparent 1px),
                linear-gradient(90deg, var(--grid-line) 1px, transparent 1px);
            background-size: 50px 50px;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }

        /* Ambient Background Canvas */
        #neural-canvas {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: -1;
            opacity: 0.5;
            pointer-events: none;
        }

        /* Nav */
        nav {
            position: fixed;
            top: 0; width: 100%;
            padding: 20px 5%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 1000;
            background: var(--nav-bg);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-bottom: 1px solid var(--border);
        }
        
        .logo-failsafe { 
            font-family: 'JetBrains Mono', monospace;
            font-weight: 700; 
            color: var(--resonance-purple); 
            font-size: 0.9rem; 
            letter-spacing: 1.5px;
        }

        .back-link { 
            text-decoration: none; 
            color: var(--text-dim); 
            font-size: 0.8rem; 
            font-family: 'JetBrains Mono'; 
            transition: 0.3s; 
            letter-spacing: 1px;
        }
        .back-link:hover { color: var(--blueprint-blue); }

        /* Content Container */
        .coming-soon-box {
            text-align: center;
            max-width: 600px;
            padding: 50px 30px;
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 16px;
            backdrop-filter: blur(10px);
            z-index: 10;
            margin: 20px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.5);
        }

        .status-badge {
            display: inline-block;
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.75rem;
            color: var(--resonance-purple);
            border: 1px solid rgba(168, 85, 247, 0.3);
            background: rgba(168, 85, 247, 0.05);
            padding: 6px 16px;
            border-radius: 50px;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 25px;
            animation: pulse 2s infinite ease-in-out;
        }

        h1 {
            font-size: clamp(2rem, 6vw, 3rem);
            font-weight: 700;
            letter-spacing: -1px;
            margin-bottom: 15px;
        }
        h1 span {
            color: var(--blueprint-blue);
        }

        .description {
            font-size: 1rem;
            line-height: 1.6;
            color: var(--text-dim);
            margin-bottom: 30px;
        }

        /* Central CTA Button */
        .cta-button {
            display: inline-block;
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.9rem;
            font-weight: 700;
            color: #ffffff;
            text-decoration: none;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            background: linear-gradient(135deg, var(--blueprint-blue), var(--resonance-purple));
            padding: 14px 32px;
            border-radius: 8px;
            box-shadow: 0 4px 15px rgba(0, 163, 255, 0.25);
            transition: transform 0.2s ease, box-shadow 0.2s ease;
            margin-bottom: 30px;
        }
        .cta-button:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(168, 85, 247, 0.4);
        }
        .cta-button:active {
            transform: translateY(1px);
        }

        /* Bottom Blurb Styling */
        .redirect-blurb {
            font-size: 0.85rem;
            line-height: 1.6;
            color: var(--text-dim);
            border-top: 1px solid var(--border);
            padding-top: 25px;
            margin-top: 25px;
        }
        .inline-link {
            color: var(--blueprint-blue);
            text-decoration: none;
            font-weight: 600;
            border-bottom: 1px dashed var(--blueprint-blue);
            transition: color 0.2s, border-color 0.2s;
        }
        .inline-link:hover {
            color: var(--resonance-purple);
            border-color: var(--resonance-purple);
        }

        /* Animated Loading Progress Bar */
        .progress-container {
            width: 100%;
            height: 4px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 2px;
            overflow: hidden;
            margin-bottom: 25px;
        }
        .progress-bar {
            height: 100%;
            width: 35%;
            background: linear-gradient(90deg, var(--blueprint-blue), var(--resonance-purple));
            border-radius: 2px;
            animation: slide 3s infinite linear;
        }

        .terminal-readout {
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.75rem;
            color: var(--blueprint-blue);
            opacity: 0.8;
        }

        /* Animations */
        @keyframes pulse {
            0%, 100% { opacity: 0.7; border-color: rgba(168, 85, 247, 0.3); }
            50% { opacity: 1; border-color: var(--resonance-purple); box-shadow: 0 0 10px rgba(168, 85, 247, 0.2); }
        }
        @keyframes slide {
            0% { transform: translateX(-100%); }
            100% { transform: translateX(300%); }
        }
    </style>
</head>
<body>

    <!-- Ambient Constellation Background -->
    <canvas id="neural-canvas"></canvas>

    <!-- Nav -->
    <nav>
        <!-- Top left logo set to OLD FRAMEWORK -->
        <div class="logo logo-failsafe"></div>
        <!-- Top right link set to THE BLUEPRINT linking to blueprint-online.com -->
        <a href="https://blueprint-online.com" class="back-link" target="_blank" rel="noopener noreferrer">THE BLUEPRINT</a>
    </nav>

    <!-- Main Container -->
    <div class="coming-soon-box">
        <!-- Status updated to Legacy Site -->
        <div class="status-badge">Legacy Site</div>
        <!-- Title updated to The Blueprint -->
        <h1><span>The Blueprint</span></h1>
        
        <!-- Sentence at the bottom of this section removed -->
        <p class="description">You are viewing the original site for this project. <br>Discover the fully realized framework below.</p>
        
        <!-- Center portal link -->
        <a href="https://blueprint-online.com" class="cta-button" target="_blank" rel="noopener noreferrer">Launch Blueprint</a>

        <div class="progress-container">
            <div class="progress-bar"></div>
        </div>
        
        <div class="terminal-readout">SYSTEM STATUS: READY</div>
    </div>

    <!-- Background Neural Constellation Animation -->
    <script>
        (function() {
            const canvas = document.getElementById('neural-canvas');
            const ctx = canvas.getContext('2d');
            let nodes = [];
            const maxNodes = 50;

            function resize() {
                canvas.width = window.innerWidth;
                canvas.height = window.innerHeight;
            }

            function init() {
                resize();
                nodes = [];
                for (let i = 0; i < maxNodes; i++) {
                    nodes.push({
                        x: Math.random() * canvas.width,
                        y: Math.random() * canvas.height,
                        vx: (Math.random() - 0.5) * 0.25,
                        vy: (Math.random() - 0.5) * 0.25,
                        color: Math.random() > 0.5 ? '0, 163, 255' : '168, 85, 247',
                        size: Math.random() * 1.5 + 1
                    });
                }
            }

            function draw() {
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                nodes.forEach((n, idx) => {
                    n.x += n.vx;
                    n.y += n.vy;

                    if (n.x < 0 || n.x > canvas.width) n.vx *= -1;
                    if (n.y < 0 || n.y > canvas.height) n.vy *= -1;

                    ctx.fillStyle = `rgba(${n.color}, 0.5)`;
                    ctx.beginPath();
                    ctx.arc(n.x, n.y, n.size, 0, Math.PI * 2);
                    ctx.fill();

                    for (let j = idx + 1; j < nodes.length; j++) {
                        const n2 = nodes[j];
                        const dist = Math.hypot(n.x - n2.x, n.y - n2.y);
                        if (dist < 140) {
                            const alpha = (1 - (dist / 140)) * 0.08;
                            ctx.strokeStyle = n.color === n2.color 
                                ? `rgba(${n.color}, ${alpha})`
                                : `rgba(134, 124, 251, ${alpha})`;
                            ctx.lineWidth = 0.8;
                            ctx.beginPath();
                            ctx.moveTo(n.x, n.y);
                            ctx.lineTo(n2.x, n2.y);
                            ctx.stroke();
                        }
                    }
                });
                requestAnimationFrame(draw);
            }

            window.addEventListener('resize', init);
            init();
            draw();
        })();
    </script>
</body>
</html>
